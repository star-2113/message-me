<!DOCTYPE html>
<html>

<head>

    <title>Settings - Message Me</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="settings-header">

    <h1>⚙️ Settings</h1>

    <button
    class="home-button"
    onclick="window.location.href='chat.html'">

        🏠 Home

    </button>

</header>



<div class="settings-container">


    <!-- ACCOUNT -->

    <div class="settings-card">

        <h2>👤 Account</h2>


        <label>Display Name</label>

        <input
        id="displayNameInput"
        type="text"
        placeholder="Display Name">


        <label>Username</label>

        <input
        id="usernameInput"
        type="text"
        placeholder="Username">


        <label>Bio</label>

        <textarea
        id="bioInput"
        placeholder="Tell people a little about yourself..."></textarea>


        <label>Email</label>

        <input
        id="emailInput"
        type="email"
        placeholder="Email">


        <div style="margin-top:20px;">

            <button onclick="saveProfile()">

                💾 Save Profile

            </button>

            <button onclick="saveEmail()">

                📧 Change Email

            </button>

        </div>

    </div>



    <!-- APPEARANCE -->

    <div class="settings-card">

        <h2>🎨 Appearance</h2>

        <div
        class="setting-option"
        onclick="mode()">

            🌙 Toggle Dark Mode

        </div>

    </div>



    <!-- NOTIFICATIONS -->

    <div class="settings-card">

        <h2>🔔 Notifications</h2>

        <div class="setting-option">

            💬 Message Notifications

        </div>

        <div class="setting-option">

            👥 Friend Request Notifications

        </div>

    </div>



    <!-- SECURITY -->

    <div class="settings-card">

        <h2>🔒 Security</h2>

        <div class="setting-option">

            🔑 Change Password

        </div>

    </div>



    <!-- DANGER ZONE -->

    <div class="settings-card">

        <h2>⚠️ Danger Zone</h2>

        <button class="delete-btn">

            🗑 Delete Account

        </button>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="script.js"></script>

<script>

window.onload = async function(){

    const { data } =
        await supabaseClient.auth.getUser();

    currentUser = data.user;

    await loadSettings();

};

</script>

</body>

</html>
