<!DOCTYPE html>
<html>

<head>

    <title>Message Me</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<header>

    <h1 id="chatTitle">
        💬 Message Me
    </h1>

</header>



<div class="container">


    <!-- SIDEBAR -->
    <div class="sidebar">


        <input
            id="searchFriends"
            placeholder="🔍 Search friends..."
            onkeyup="searchFriends()">



        <h2>Friends</h2>


        <div id="friendsList">

            <!-- Friends appear here -->

        </div>



        <hr>



        <h2>Add Friends</h2>


        <input
            id="userSearch"
            placeholder="Search username...">



        <button onclick="searchUsers()">
            Search
        </button>



        <div id="searchResults">

            <!-- Search results appear here -->

        </div>





        <!-- BOTTOM BUTTONS -->

        <div class="sidebar-bottom">


            <div class="bottom-button" onclick="mode()">

                🌙 Theme

            </div>



            <div class="bottom-button"
            onclick="window.location.href='settings.html'">

                ⚙️ Settings

            </div>



        </div>



    </div>






    <!-- CHAT AREA -->

    <div class="chat">



        <!-- CHAT HEADER -->

        <div class="chat-header">


            <div class="chat-user">


                <img
                id="chatAvatar"
                src="https://api.dicebear.com/9.x/initials/svg?seed=User"
                class="chat-avatar">



                <div>

                    <h2 id="chatName">
                        Select a friend 💙
                    </h2>


                    <small>
                        Online
                    </small>


                </div>



            </div>



            <div class="online-dot"></div>



        </div>







        <!-- MESSAGES -->

        <div id="messages">

            <!-- Messages appear here -->

        </div>






        <!-- MESSAGE INPUT -->

        <div class="input-area">


            <input
            id="messageInput"
            placeholder="Type a message..."
            onkeydown="enterSend(event)">



            <button onclick="sendMessage()">

                Send

            </button>



        </div>




    </div>




</div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>
