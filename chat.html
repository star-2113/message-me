<!DOCTYPE html>
<html>

<head>

    <title>Message Me</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<header>

    <h1 id="chatTitle">
        💬 Message Me
    </h1>

</header>



<div class="container">


    <!-- SIDEBAR -->

    <div class="sidebar">


        <input
        id="searchFriends"
        placeholder="🔍 Search friends..."
        onkeyup="searchFriends()">



        <h2>Friends</h2>


        <div id="friendsList">

        </div>



        <hr>



        <h2>Add Friends</h2>


        <input
        id="userSearch"
        placeholder="Search username...">



        <button onclick="searchUsers()">
            Search
        </button>



        <div id="searchResults">

        </div>





        <!-- BOTTOM BUTTONS -->

        <div class="sidebar-bottom">


            <div class="bottom-button"
            onclick="openProfile(currentUser.id)">

                👤 Profile

            </div>



            <div class="bottom-button"
            onclick="mode()">

                🌙 Theme

            </div>



            <div class="bottom-button"
            onclick="window.location.href='settings.html'">

                ⚙️ Settings

            </div>


        </div>


    </div>







    <!-- CHAT AREA -->


    <div class="chat">



        <div class="chat-header">


            <div class="chat-user">


                <img
                id="chatAvatar"
                src="https://api.dicebear.com/9.x/initials/svg?seed=User"
                class="chat-avatar">



                <div>


                    <h2 id="chatName">

                        Select a friend 💙

                    </h2>


                    <small>

                        Online

                    </small>


                </div>


            </div>



            <div class="online-dot"></div>


        </div>







        <div id="messages">


        </div>







        <div class="input-area">


            <input
            id="messageInput"
            placeholder="Type a message..."
            onkeydown="enterSend(event)">



            <button onclick="sendMessage()">

                Send

            </button>


        </div>



    </div>



</div>







<!-- PROFILE POPUP -->


<div id="profilePanel" class="profile-panel">


    <div class="profile-card">


        <button 
        class="close-profile"
        onclick="closeProfile()">

            ✖

        </button>




        <img
        id="profileImage"
        src="https://api.dicebear.com/9.x/initials/svg?seed=User"
        class="profile-picture">



        <h2 id="profileName">

            Name

        </h2>



        <p id="profileUsername">

            @username

        </p>



        <p id="profileBio">

            No bio yet 💙

        </p>



        <button onclick="window.location.href='settings.html'">

            ⚙️ Edit Profile

        </button>



    </div>


</div>







<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="script.js"></script>


</body>

</html>
