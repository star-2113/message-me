<!DOCTYPE html>
<html>
<head>
<title>Message Me</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
💬 Message Me
<button onclick="mode()">🌙</button>
</header>

<div class="container">

    <div class="sidebar">

        <input
            id="searchFriends"
            placeholder="🔍 Search friends..."
            onkeyup="searchFriends()">

        <h2>Friends</h2>

        <<div id="friendsList"></div>

        <h2>Groups</h2>

        <div class="friend" onclick="openChat('Study Group')">📚 Study Group</div>
        <div class="friend" onclick="openChat('Gaming')">🎮 Gaming</div>

    </div>

    <div class="chat">

        <h2 id="chatName">Chat</h2>

        <div id="messages"></div>

        <div class="input-area">
            <input id="messageInput" placeholder="Type a message..." onkeydown="enterSend(event)">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>
