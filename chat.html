<!DOCTYPE html>
<html>

<head>

    <title>Message Me</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<header>

    <h1>💬 Message Me</h1>

    <div class="header-buttons">

        <button onclick="mode()">🌙</button>

        <button onclick="openSettings()">⚙️</button>

    </div>

</header>



<div class="container">


    <!-- SIDEBAR -->
    <div class="sidebar">


        <input
            id="searchFriends"
            placeholder="🔍 Search friends..."
            onkeyup="searchFriends()">



        <h2>Friends</h2>


        <div id="friendsList">

            <!-- Friends load here from Supabase -->

        </div>



        <hr>



        <h2>Add Friends</h2>


        <input
            id="userSearch"
            placeholder="Search username...">



        <button onclick="searchUsers()">
            Search
        </button>



        <div id="searchResults">

            <!-- Search results appear here -->

        </div>


    </div>





    <!-- CHAT AREA -->
    <div class="chat">


        <h2 id="chatName">
            Select a friend 💙
        </h2>



        <div id="messages">

            <!-- Messages appear here -->

        </div>




        <div class="input-area">


            <input
                id="messageInput"
                placeholder="Type a message..."
                onkeydown="enterSend(event)">



            <button onclick="sendMessage()">
                Send
            </button>


        </div>


    </div>



</div>
<!-- IMPORTANT: ORDER MATTERS -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="script.js"></script>

</body>

</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="settings-panel">

    <div class="settings-header">
        <h2>⚙️ Settings</h2>
        <button onclick="closeSettings()">✖</button>
    </div>

    <h3>Account</h3>

    <button>👤 Change Display Name</button>
    <button>🖼️ Change Profile Picture</button>
    <button>📝 Change Username</button>
    <button>📧 Change Email</button>
    <button>🔑 Change Password</button>

    <button class="delete-btn">🗑 Delete Account</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>
